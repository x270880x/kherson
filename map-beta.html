<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Бета-карта (MapLibre) — кадастр Херсонской области</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<style>
  html,body{margin:0;height:100%;background:#0f1117;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  #hud{position:absolute;top:10px;left:10px;z-index:5;background:rgba(15,17,23,.88);border:1px solid #2a2f42;border-radius:8px;padding:9px 11px;color:#d8dce8;font-size:12px;line-height:1.5;max-width:250px}
  #hud b{color:#e8c547}
  #hud a{color:#e8c547;text-decoration:none}
  #hud a:hover{text-decoration:underline}
  #hud .leg{display:flex;align-items:center;gap:6px;margin-top:3px;cursor:pointer;user-select:none}
  #hud .leg input{margin:0;width:13px;height:13px;accent-color:#e8c547;flex-shrink:0}
  #hud .leg.off{opacity:.4}
  #hud .sw{width:11px;height:11px;border-radius:2px;flex-shrink:0}
  #hud .back{display:inline-block;margin-bottom:7px;padding:3px 8px;border:1px solid #2a2f42;border-radius:5px}
  .maplibregl-popup-content{background:#181c27;color:#e8e8ea;border:1px solid #2a2f42;font-size:12px}
  .maplibregl-popup-tip{border-top-color:#181c27!important;border-bottom-color:#181c27!important}
  #zoomctl{position:absolute;right:10px;bottom:28px;z-index:5;display:flex;flex-direction:column;gap:2px}
  #zoomctl button{width:34px;height:34px;background:rgba(15,17,23,.9);border:1px solid #2a2f42;color:#e8e8ea;font-size:20px;line-height:1;cursor:pointer;border-radius:6px}
  #zoomctl button:hover{border-color:#e8c547;color:#e8c547}
  #zoomctl button:active{transform:scale(.94)}
  #search{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;width:300px;max-width:60vw}
  #search input{width:100%;box-sizing:border-box;background:rgba(15,17,23,.92);border:1px solid #2a2f42;border-radius:7px;color:#e8e8ea;font-size:13px;padding:8px 11px;outline:none}
  #search input:focus{border-color:#e8c547}
  #qres{margin-top:3px;background:rgba(15,17,23,.96);border:1px solid #2a2f42;border-radius:7px;overflow:hidden}
  #qres:empty{display:none}
  .qrow{padding:7px 11px;font-size:12px;color:#e8e8ea;cursor:pointer;border-bottom:1px solid #20242f}
  .qrow:last-child{border-bottom:none}
  .qrow:hover{background:#1f2433}
  .qrow.muted{color:#8b91a8;cursor:default}
  #basket{position:absolute;left:10px;bottom:14px;z-index:6;display:flex;align-items:center;gap:8px;background:rgba(15,17,23,.9);border:1px solid #2a2f42;border-radius:8px;padding:7px 11px;color:#d8dce8;font-size:12px}
  #basket b{color:#e8c547}
  #basket button{background:transparent;border:1px solid #2a2f42;color:#d8dce8;font-size:11px;padding:3px 8px;border-radius:5px;cursor:pointer}
  #basket button:hover{border-color:#e8c547;color:#e8c547}
  #hud select,#hud input[list]{width:100%;box-sizing:border-box;margin-top:3px;background:#1f2433;color:#e8e8ea;border:1px solid #2a2f42;border-radius:5px;font-size:11px;padding:4px}
  #fine-hint{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:5;display:none;background:rgba(15,17,23,.92);border:1px solid #2a2f42;border-radius:6px;color:#e8c547;font-size:12px;padding:6px 12px;white-space:nowrap}
</style>
</head>
<body>
<div id="map"></div>
<div id="hud">
  <a class="back" href="index.html">← Основная карта</a>
  <div><b>Бета-карта</b> · MapLibre GL (GPU)</div>
  <div>Все ~530к участков, плавно на любом зуме. Галочками — показать/скрыть форму собственности. Клик — данные участка; Shift+клик / Shift+рамка — в подборку.</div>
  <label class="leg" data-o="p"><input type="checkbox" checked><span class="sw" style="background:#4caf7d"></span>Частная</label>
  <label class="leg" data-o="k"><input type="checkbox" checked><span class="sw" style="background:#e8c547"></span>Коммунальная</label>
  <label class="leg" data-o="g"><input type="checkbox" checked><span class="sw" style="background:#4a9eff"></span>Государственная</label>
  <label class="leg" data-o="n"><input type="checkbox" checked><span class="sw" style="background:#e05252"></span>Не определено</label>
  <div style="margin-top:8px;border-top:1px solid #20242f;padding-top:7px">
    <span style="color:#8b91a8">Категория земель:</span>
    <select id="f-ct"><option value="">все</option></select>
    <span style="color:#8b91a8;display:block;margin-top:5px">Год аренды (до):</span>
    <select id="f-ly"><option value="">все</option><option value="none">без аренды</option><option value="expired">истёкшие (до 2026)</option></select>
    <span style="color:#8b91a8;display:block;margin-top:5px">Арендатор:</span>
    <input id="f-r" list="renters-dl" placeholder="имя или часть" autocomplete="off"/>
    <datalist id="renters-dl"></datalist>
    <span style="color:#8b91a8;display:block;margin-top:5px">Межевание (РФ кадастр):</span>
    <select id="f-mz"><option value="">все</option><option value="yes">только размежёванные</option><option value="no">только без межевания</option></select>
  </div>
</div>
<div id="fine-hint"></div>
<div id="zoomctl"><button id="zin" aria-label="Приблизить">+</button><button id="zout" aria-label="Отдалить">−</button></div>
<div id="search"><input id="q" type="text" placeholder="Село или кадастр 6520…:01:001:0001" autocomplete="off"/><div id="qres"></div></div>
<div id="basket">📌 <b id="bk-count">0</b> уч. <button id="bk-exp">CSV</button><button id="bk-clr">Очистить</button></div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const OWN = { p:['Частная','#4caf7d'], k:['Коммунальная','#e8c547'], g:['Государственная','#4a9eff'], n:['Не определено','#e05252'] };
const map = new maplibregl.Map({
  container: 'map',
  attributionControl: { compact: true },
  center: [33.45, 46.72], zoom: 9, maxZoom: 19,
  fadeDuration: 0,
  style: {
    version: 8,
    glyphs: 'https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf',
    sources: {
      base: { type:'raster', tiles:['https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png'], tileSize:256, attribution:'© OpenStreetMap, © CARTO' },
      omt: { type:'vector', url:'https://tiles.openfreemap.org/planet', attribution:'© OpenMapTiles' },
      parcels: { type:'vector', tiles:[location.origin + location.pathname.replace(/[^/]*$/, '') + 'tiles/{z}/{x}/{y}.pbf'], minzoom:8, maxzoom:14 }
    },
    layers: [
      { id:'base', type:'raster', source:'base' },
      { id:'parcels-fill', type:'fill', source:'parcels', 'source-layer':'parcels',
        paint:{ 'fill-color':['match',['get','o'],'p','#4caf7d','k','#e8c547','g','#4a9eff','n','#e05252','#888888'], 'fill-opacity':0.55, 'fill-antialias':false } },
      { id:'parcels-line', type:'line', source:'parcels', 'source-layer':'parcels', minzoom:14,
        paint:{ 'line-color':'#11141d', 'line-width':0.4 } },
      { id:'lbl-water', type:'symbol', source:'omt', 'source-layer':'water_name',
        layout:{ 'text-field':['coalesce',['get','name:ru'],['get','name']], 'text-font':['Noto Sans Italic'], 'text-size':['interpolate',['linear'],['zoom'],6,10,12,15], 'text-max-width':8 },
        paint:{ 'text-color':'#8fb6e0', 'text-halo-color':'#0f1117', 'text-halo-width':1.1 } },
      { id:'lbl-place', type:'symbol', source:'omt', 'source-layer':'place',
        filter:['in',['get','class'],['literal',['city','town','village','state']]],
        layout:{ 'text-field':['coalesce',['get','name:ru'],['get','name:latin'],['get','name']], 'text-font':['Noto Sans Regular'], 'text-size':['interpolate',['exponential',1.2],['zoom'],6,11,11,15], 'text-max-width':8 },
        paint:{ 'text-color':'#eef1f6', 'text-halo-color':'#0f1117', 'text-halo-width':1.4 } }
    ]
  }
});

const zc = document.getElementById('zoomctl');
const zoomStep = d => map.easeTo({ zoom: Math.round(map.getZoom()) + d, duration: 0 });
document.getElementById('zin').onclick  = () => zoomStep(+1);
document.getElementById('zout').onclick = () => zoomStep(-1);

// ── Полный попап участка: индекс советов + point-in-polygon по оригиналам + ленивая подгрузка ──
const BASE = location.origin + location.pathname.replace(/[^/]*$/, '');
let CIDX = [];
fetch(BASE + 'councils-index.json').then(r=>r.json()).then(d=>CIDX=d).catch(()=>{});
const cjCache = {}, pfCache = {};
async function councilParcels(code){ if(!cjCache[code]){ try{ const r=await fetch(BASE+'councils/'+code+'.json'); cjCache[code]=r.ok?((await r.json()).parcels||[]):[]; }catch(e){cjCache[code]=[];} } return cjCache[code]; }
async function rawFeats(code){ if(!pfCache[code]){ try{ const r=await fetch(BASE+'parcels/'+code+'.geojson'); pfCache[code]=r.ok?((await r.json()).features||[]):[]; }catch(e){pfCache[code]=[];} } return pfCache[code]; }
const PRE={'смт':'пгт','пгт':'пгт','м.':'г.','с.':'с.','х.':'х.'};
function ruName(name){ const m=(name||'').match(/^(.*?)\s*\(([^)]+)\)\s*$/); if(!m) return name||''; const ua=m[1].trim(); const pm=ua.match(/^(смт|пгт|с\.|х\.|м\.)\s+/i); const pre=pm?((PRE[pm[1].toLowerCase()]||pm[1])+' '):''; return pre+m[2].trim(); }
function ptInRing(x,y,r){ let inside=false; for(let i=0,j=r.length-1;i<r.length;j=i++){ const xi=r[i][0],yi=r[i][1],xj=r[j][0],yj=r[j][1]; if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }
function geomHas(g,x,y){ const f=rr=>ptInRing(x,y,rr[0])&&!rr.slice(1).some(h=>ptInRing(x,y,h)); if(g.type==='Polygon')return f(g.coordinates); if(g.type==='MultiPolygon')return g.coordinates.some(f); return false; }
const OTC={'Приватна власність':['Частная','#4caf7d'],'Комунальна власність':['Коммунальная','#e8c547'],'Державна власність':['Государственная','#4a9eff'],'Не визначено':['Не определено','#e05252']};
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function popupHTML(rec, cname){
  const ot=OTC[rec.ot]||['—','#888']; let h='<div style="font-size:12px;line-height:1.5;max-width:300px;color:#e8e8ea">';
  h+='<div style="font-family:ui-monospace,monospace;color:#e8c547;font-weight:600;word-break:break-all">'+esc(rec.c)+'</div>';
  h+='<div style="color:#8b91a8;font-size:11px;margin-bottom:4px">'+(rec.a!=null?rec.a+' га':'')+(cname?' · '+esc(cname):'')+'</div>';
  if(rec.r) h+='<div><span style="color:#8b91a8">аренд.:</span> '+esc(rec.r)+'</div>';
  if(rec.o) h+='<div><span style="color:#8b91a8">собств.:</span> '+esc(rec.o)+'</div>';
  if(rec.ed) h+='<div><span style="color:#8b91a8">договор до:</span> '+esc(rec.ed)+(rec.cn?' · №'+esc(rec.cn):'')+'</div>';
  h+='<div style="color:'+ot[1]+';font-size:10px;margin-top:4px">'+ot[0]+'</div>';
  if(rec.mz) h+='<div style="margin-top:5px;padding:4px 7px;background:rgba(192,80,255,.15);border:1px solid #c050ff;border-radius:3px"><div style="color:#c050ff;font-weight:600;font-size:11px">🇷🇺 Межевание сделано</div><div style="font-family:ui-monospace,monospace;font-size:11px;color:#fff;word-break:break-all">'+esc(rec.mz)+'</div></div>';
  return h+'</div>';
}
let boxDragged=false;
map.on('click', 'parcels-fill', async e => {
  if(boxDragged){ boxDragged=false; return; }            // после рамки клик не обрабатываем
  const x=e.lngLat.lng, y=e.lngLat.lat, shift=e.originalEvent && e.originalEvent.shiftKey;
  const popup = shift ? null : new maplibregl.Popup({maxWidth:'320px'}).setLngLat(e.lngLat).setHTML('<span style="font-size:12px;color:#8b91a8">загрузка…</span>').addTo(map);
  const near=CIDX.filter(c=>Math.abs(c.lat-y)<0.25&&Math.abs(c.lon-x)<0.3).sort((a,b)=>((a.lat-y)**2+(a.lon-x)**2)-((b.lat-y)**2+(b.lon-x)**2)).slice(0,4);
  for(const c of near){
    const feats=await rawFeats(c.c);
    const hit=feats.find(f=>f.geometry&&geomHas(f.geometry,x,y));
    if(hit){ const cad=hit.properties.cadnum; const rec=(await councilParcels(c.c)).find(p=>p.c===cad)||{c:cad};
      if(shift) basketToggle(cad, hit.geometry, rec, ruName(c.n));
      else popup.setHTML(popupHTML(rec, ruName(c.n)));
      return; }
  }
  if(!shift){ const o=OWN[e.features[0].properties.o]||['—','#888']; popup.setHTML('<div style="font-size:12px"><b style="color:'+o[1]+'">'+o[0]+'</b><div style="color:#8b91a8;font-size:10px;margin-top:2px">точный участок не найден</div></div>'); }
});
map.on('mouseenter','parcels-fill',()=>map.getCanvas().style.cursor='pointer');
map.on('mouseleave','parcels-fill',()=>map.getCanvas().style.cursor='');

// Переключатели форм собственности — показать/скрыть по ВСЕЙ карте (вкл. частные)
const ownActive = new Set(['p','k','g','n']);
function applyOwnFilter(){
  const f = ['in', ['get','o'], ['literal', [...ownActive]]];
  if (map.getLayer('parcels-fill')) map.setFilter('parcels-fill', f);
  if (map.getLayer('parcels-line')) map.setFilter('parcels-line', f);
}
document.querySelectorAll('#hud .leg[data-o]').forEach(lab => {
  lab.querySelector('input').addEventListener('change', e => {
    if (e.target.checked) ownActive.add(lab.dataset.o); else ownActive.delete(lab.dataset.o);
    lab.classList.toggle('off', !e.target.checked);
    applyOwnFilter();
    if (typeof hasFine==='function' && hasFine()) fineUpdate();
  });
});

// ── Поиск: село (рус/укр) или кадастровый номер ──
const qEl=document.getElementById('q'), qres=document.getElementById('qres');
const CAD_RE=/\d{10}:\d{2}:\d{3}:\d{4}/;
function flyCouncil(c){ map.jumpTo({center:[c.lon,c.lat], zoom:13}); }
async function flyCad(cad){
  const code=cad.slice(0,10), c=CIDX.find(x=>x.c===code);
  if(!c){ qres.innerHTML='<div class="qrow muted">совет не найден</div>'; return; }
  map.jumpTo({center:[c.lon,c.lat], zoom:15});
  const f=(await rawFeats(code)).find(ff=>ff.properties.cadnum===cad);
  if(f){
    const ring=f.geometry.type==='Polygon'?f.geometry.coordinates[0]:f.geometry.coordinates[0][0];
    let sx=0,sy=0; ring.forEach(p=>{sx+=p[0];sy+=p[1];}); const cx=sx/ring.length, cy=sy/ring.length;
    map.jumpTo({center:[cx,cy], zoom:17});
    const rec=(await councilParcels(code)).find(p=>p.c===cad)||{c:cad};
    new maplibregl.Popup({maxWidth:'320px'}).setLngLat([cx,cy]).setHTML(popupHTML(rec, ruName(c.n))).addTo(map);
    qres.innerHTML='';
  } else qres.innerHTML='<div class="qrow muted">участок не найден в совете</div>';
}
qEl.addEventListener('input', ()=>{
  const v=qEl.value.trim(); if(!v){ qres.innerHTML=''; return; }
  if(CAD_RE.test(v)){ qres.innerHTML='<div class="qrow muted">↵ Enter — найти участок</div>'; return; }
  const low=v.toLowerCase();
  const hits=CIDX.map((c,i)=>({c,i})).filter(o=>ruName(o.c.n).toLowerCase().includes(low)||(o.c.n||'').toLowerCase().includes(low)).slice(0,8);
  qres.innerHTML = hits.length ? hits.map(o=>'<div class="qrow" data-i="'+o.i+'">'+esc(ruName(o.c.n))+'</div>').join('') : '<div class="qrow muted">ничего не найдено</div>';
});
qres.addEventListener('click', e=>{ const r=e.target.closest('.qrow[data-i]'); if(r){ const c=CIDX[+r.dataset.i]; flyCouncil(c); qEl.value=ruName(c.n); qres.innerHTML=''; } });
qEl.addEventListener('keydown', e=>{ if(e.key!=='Enter') return; const m=qEl.value.match(CAD_RE); if(m){ flyCad(m[0]); return; } const first=qres.querySelector('.qrow[data-i]'); if(first){ const c=CIDX[+first.dataset.i]; flyCouncil(c); qEl.value=ruName(c.n); qres.innerHTML=''; } });

// ── Подборка участков ──
const basket = new Map();   // cadnum → {geom, rec, cname}
function basketRefresh(){
  const fc={type:'FeatureCollection',features:[...basket.values()].map(v=>({type:'Feature',geometry:v.geom,properties:{}}))};
  const s=map.getSource('basket'); if(s) s.setData(fc);
  document.getElementById('bk-count').textContent=basket.size;
}
function basketToggle(cad, geom, rec, cname){
  if(basket.has(cad)) basket.delete(cad); else basket.set(cad,{geom,rec,cname});
  basketRefresh();
}
const OWN_COLOR_EXPR=['match',['get','o'],'p','#4caf7d','k','#e8c547','g','#4a9eff','n','#e05252','#888888'];
const EMPTY={type:'FeatureCollection',features:[]};
map.on('load', ()=>{
  // оверлей отфильтрованных участков (гибрид: подгрузка по зуму)
  map.addSource('fine',{type:'geojson',data:EMPTY});
  map.addLayer({id:'fine-fill',type:'fill',source:'fine',paint:{'fill-color':OWN_COLOR_EXPR,'fill-opacity':0.62,'fill-antialias':false}},'lbl-water');
  map.addLayer({id:'fine-line',type:'line',source:'fine',paint:{'line-color':'#11141d','line-width':0.4}},'lbl-water');
  // подборка — поверх всего
  map.addSource('basket',{type:'geojson',data:EMPTY});
  map.addLayer({id:'basket-fill',type:'fill',source:'basket',paint:{'fill-color':'#ffec3d','fill-opacity':0.45}});
  map.addLayer({id:'basket-line',type:'line',source:'basket',paint:{'line-color':'#ffec3d','line-width':2}});
});

// Рамка-выделение: Shift+перетаскивание
map.boxZoom.disable();
let bs=null, bsRect=null;
map.on('mousedown', e=>{ if(!e.originalEvent.shiftKey) return; bs={x:e.point.x,y:e.point.y,ll:e.lngLat}; map.dragPan.disable(); });
map.on('mousemove', e=>{ if(!bs) return; if(!bsRect){ bsRect=document.createElement('div'); document.body.appendChild(bsRect); } const x0=Math.min(bs.x,e.point.x),y0=Math.min(bs.y,e.point.y),w=Math.abs(e.point.x-bs.x),h=Math.abs(e.point.y-bs.y); const r=map.getCanvas().getBoundingClientRect(); bsRect.style.cssText='position:fixed;border:1px dashed #e8c547;background:rgba(232,197,71,.12);z-index:7;pointer-events:none;left:'+(r.left+x0)+'px;top:'+(r.top+y0)+'px;width:'+w+'px;height:'+h+'px'; });
map.on('mouseup', async e=>{
  const start=bs, rect=bsRect; bs=null; bsRect=null; map.dragPan.enable(); if(rect) rect.remove();
  if(!start) return;
  if(Math.abs(e.point.x-start.x)<4 && Math.abs(e.point.y-start.y)<4) return;  // это клик, не рамка
  boxDragged=true;
  const a=start.ll,b=e.lngLat; const minx=Math.min(a.lng,b.lng),maxx=Math.max(a.lng,b.lng),miny=Math.min(a.lat,b.lat),maxy=Math.max(a.lat,b.lat);
  const cs=CIDX.filter(c=>c.lat>=miny-0.05&&c.lat<=maxy+0.05&&c.lon>=minx-0.05&&c.lon<=maxx+0.05).slice(0,12);
  for(const c of cs){ const feats=await rawFeats(c.c); const ri={}; (await councilParcels(c.c)).forEach(p=>ri[p.c]=p);
    for(const f of feats){ const g=f.geometry; if(!g) continue; const ring=g.type==='Polygon'?g.coordinates[0]:g.coordinates[0][0]; let sx=0,sy=0; ring.forEach(p=>{sx+=p[0];sy+=p[1];}); const cx=sx/ring.length, cy=sy/ring.length;
      if(cx>=minx&&cx<=maxx&&cy>=miny&&cy<=maxy){ const cad=f.properties.cadnum; if(!basket.has(cad)) basket.set(cad,{geom:g,rec:ri[cad]||{c:cad},cname:ruName(c.n)}); } }
  }
  basketRefresh();
});

document.getElementById('bk-clr').onclick=()=>{ basket.clear(); basketRefresh(); };
document.getElementById('bk-exp').onclick=()=>{
  if(!basket.size) return;
  const rows=[['cadnum','area_ga','ownership','council','renter','owner']];
  for(const [cad,v] of basket){ const r=v.rec||{}; rows.push([cad, r.a==null?'':r.a, OTC[r.ot]?OTC[r.ot][0]:(r.ot||''), v.cname||'', r.r||'', r.o||'']); }
  const csv='﻿'+rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(';')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='podborka.csv'; a.click(); URL.revokeObjectURL(a.href);
};

// ── Тонкие фильтры (гибрид): при приближении грузим данные совета и показываем только подходящие ──
const OTC2={'Приватна власність':'p','Комунальна власність':'k','Державна власність':'g','Не визначено':'n'};
const fine={ mz:'', ct:'', ly:'', r:'' };  // межевание | категория | год аренды | арендатор
let RENTC={};
function hasFine(){ return !!(fine.mz||fine.ct||fine.ly||fine.r); }
function matchLease(rec){ const y=rec.ey; if(fine.ly==='none') return !y; if(fine.ly==='expired') return y&&y<2026; if(fine.ly==='2030+') return y&&y>=2030; return y&&String(y)===fine.ly; }
const FINE_MINZOOM=13;
function fineHint(t){ const el=document.getElementById('fine-hint'); if(!el) return; el.textContent=t||''; el.style.display=t?'block':'none'; }
let fineRun=false, finePend=false;
async function fineUpdate(){
  if(fineRun){ finePend=true; return; }
  fineRun=true;
  try{
    do{
      finePend=false;
      const overlay = hasFine() && map.getZoom()>=FINE_MINZOOM;
      map.setLayoutProperty('parcels-fill','visibility', overlay?'none':'visible');
      map.setLayoutProperty('parcels-line','visibility', overlay?'none':'visible');
      if(!hasFine()){ map.getSource('fine')&&map.getSource('fine').setData(EMPTY); fineHint(''); break; }
      if(!overlay){ map.getSource('fine')&&map.getSource('fine').setData(EMPTY); fineHint('Приблизьте, чтобы применить фильтр'); break; }
      fineHint('');
      const b=map.getBounds(); const cs=CIDX.filter(c=>b.contains([c.lon,c.lat])).slice(0,14);
      const feats=[];
      for(const c of cs){
        const fs=await rawFeats(c.c); const ri={}; (await councilParcels(c.c)).forEach(p=>ri[p.c]=p);
        for(const f of fs){ const rec=ri[f.properties.cadnum]; if(!rec||!f.geometry) continue;
          const oc=OTC2[rec.ot]||'n';
          if(!ownActive.has(oc)) continue;
          if(fine.ct && rec.ct!==fine.ct) continue;
          if(fine.ly && !matchLease(rec)) continue;
          if(fine.r && !(rec.r && rec.r.toLowerCase().includes(fine.r.toLowerCase()))) continue;
          if(fine.mz==='yes' && !rec.mz) continue;
          if(fine.mz==='no' && rec.mz) continue;
          feats.push({type:'Feature',geometry:f.geometry,properties:{o:oc}}); }
      }
      map.getSource('fine')&&map.getSource('fine').setData({type:'FeatureCollection',features:feats});
    } while(finePend && hasFine());
  } finally { fineRun=false; }
}
document.getElementById('f-mz').addEventListener('change', e=>{ fine.mz=e.target.value; fineUpdate(); });
document.getElementById('f-ct').addEventListener('change', e=>{ fine.ct=e.target.value; fineUpdate(); });
document.getElementById('f-ly').addEventListener('change', e=>{ fine.ly=e.target.value; fineUpdate(); });
fetch(BASE+'filters-beta.json').then(r=>r.json()).then(F=>{
  const ct=document.getElementById('f-ct');
  (F.categories||[]).forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c.length>52?c.slice(0,50)+'…':c; ct.appendChild(o); });
  const ly=document.getElementById('f-ly');
  (F.lease_years||[]).slice().sort((a,b)=>b-a).forEach(y=>{ const o=document.createElement('option'); o.value=String(y); o.textContent='до '+y; ly.appendChild(o); });
  const dl=document.getElementById('renters-dl');
  (F.renters||[]).forEach(r=>{ const o=document.createElement('option'); o.value=r; dl.appendChild(o); });
  RENTC=F.renter_councils||{};
}).catch(()=>{});
document.getElementById('f-r').addEventListener('change', e=>{
  fine.r=e.target.value.trim();
  const codes=RENTC[fine.r];                       // точное имя → перелёт к его советам
  if(codes && codes.length){ const pts=codes.map(cc=>CIDX.find(x=>x.c===cc)).filter(Boolean); if(pts.length){ const lo=pts.map(p=>p.lon),la=pts.map(p=>p.lat); map.fitBounds([[Math.min(...lo),Math.min(...la)],[Math.max(...lo),Math.max(...la)]],{padding:60,maxZoom:14,duration:0}); } }
  fineUpdate();
});
map.on('moveend', ()=>{ if(hasFine()) fineUpdate(); });
</script>
